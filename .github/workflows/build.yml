name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Next.js
        run: npx next build

      - name: Prepare Electron bundle
        run: npm run electron:prepare

      - name: Make ZIP
        run: npx electron-forge make --targets=@electron-forge/maker-zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Itsyconnect-macOS
          path: out/make/zip/**/*.zip

      - name: Quarantine warning
        run: |
          echo "::warning::After downloading the .app, run: xattr -d com.apple.quarantine /path/to/Itsyconnect.app"